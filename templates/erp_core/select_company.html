{% extends "base/_base.html" %}
{% block title %}Select company{% endblock %}

{% block content %}
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center">
  <div style="width:100%;max-width:440px;padding:0 1rem">

    <h1 style="font-size:1.25rem;font-weight:500;margin-bottom:.5rem">Select a company</h1>
    <p style="color:var(--text-muted);font-size:.9rem;margin-bottom:1.5rem">
      You belong to multiple companies. Choose one to continue.
    </p>

    <form method="post">
      {% csrf_token %}
      {% for role in roles %}
        <button type="submit" name="company_id" value="{{ role.company.id }}"
                style="width:100%;text-align:left;padding:1rem 1.25rem;margin-bottom:.5rem;
                       background:var(--bg-card);border:0.5px solid var(--border);
                       border-radius:12px;cursor:pointer;display:flex;
                       justify-content:space-between;align-items:center">
          <div>
            <div style="font-weight:500;font-size:.9375rem">{{ role.company.name }}</div>
            <div style="font-size:.8125rem;color:var(--text-muted);margin-top:2px">
              {{ role.get_role_display }} · {{ role.company.get_industry_type_display }}
            </div>
          </div>
          <i class="ti ti-arrow-right" style="font-size:18px;color:var(--text-muted)" aria-hidden="true"></i>
        </button>
      {% endfor %}
    </form>

  </div>
</div>
{% endblock %}
